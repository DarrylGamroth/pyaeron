name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Unit tests
        run: make test

      - name: Integration smoke
        if: matrix.python-version == '3.12'
        env:
          AERON_LIBRARY_PATH: /opt/aeron/lib/libaeron.so
          AERON_MD_BINARY: /opt/aeron/bin/aeronmd
        run: make test-integration-fast

  integration-extended:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Extended integration matrix
        env:
          AERON_LIBRARY_PATH: /opt/aeron/lib/libaeron.so
          AERON_MD_BINARY: /opt/aeron/bin/aeronmd
        run: make test-integration-extended
